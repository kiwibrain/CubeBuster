spring:
  application:
    name: clientes

  datasource:
    url: jdbc:mysql://localhost:3306/db_clientes?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # 2. CONFIGURACIÓN DE REGISTRO EN EUREKA
  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/

  # 3. CONFIGURACIÓN DE SWAGGER / OPENAPI
  springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      path: /swagger-ui.html

server:
  port: 8081

logging:
  level:
    root: INFO
    duoc.clientes: DEBUG
  file:
    name: logs/clientes.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"