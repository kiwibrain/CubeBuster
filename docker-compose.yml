services:
  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  clientes-service:
    build: ./clientes-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - DB_URL=jdbc:mysql://cubebuster-fullstack02-duocuc-5098.j.aivencloud.com:27356/defaultdb?sslMode=REQUIRED
      - DB_USER=avnadmin
      - DB_PASSWORD=${AIVEN-PASSWORD}

  peliculas-service:
    build: ./peliculas-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  reservas-service:
    build: ./reservas-service
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
      - clientes-service
      - peliculas-service
      - juegos-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  reclamos-service:
    build: ./reclamos-service
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
      - clientes-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  juegos-service:
    build: ./juegos-service
    ports:
      - "8085:8085"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  resenas-service:
    build: ./resenas-service
    ports:
      - "8086:8086"
    depends_on:
      - eureka-server
      - peliculas-service
      - juegos-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  pagos-service:
    build: ./pagos-service
    ports:
      - "8087:8087"
    depends_on:
      - eureka-server
      - clientes-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  cupones-service:
    build: ./cupones-service
    ports:
      - "8088:8088"
    depends_on:
      - eureka-server
      - clientes-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  sucursales-service:
    build: ./sucursales-service
    ports:
      - "8089:8089"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  multas-service:
    build: ./multas-service
    ports:
      - "8090:8090"
    depends_on:
      - eureka-server
      - clientes-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/