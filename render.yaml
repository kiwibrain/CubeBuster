services:
  - type: web
    name: cb-cliente
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/cliente-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false

  - type: web
    name: cb-reservas
    runtime: docker
    plan: free
    dockerfilePath: ./render/docker/reservas-service.Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_ENABLED
        value: false
      - key: APP_DISCOVERY_ENABLED
        value: false
      - key: CLIENTE_SERVICE_URL
        value: https://cb-cliente.onrender.com
      - key: PELICULAS_SERVICE_URL
        value: https://cb-peliculas.onrender.com
      - key: JUEGOS_SERVICE_URL
        value: https://cb-juegos.onrender.com

