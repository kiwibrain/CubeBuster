server:
  port: ${PORT:8086}

spring:
  profiles:
    active: dev
  application:
    name: resenas-service
  datasource:
    url: jdbc:h2:mem:resenas_service_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    cubeBuster: INFO
    org.springframework.web: WARN

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

app:
  discovery:
    enabled: ${APP_DISCOVERY_ENABLED:true}

services:
  cliente:
    url: ${CLIENTE_SERVICE_URL:http://CLIENTE-SERVICE}
  peliculas:
    url: ${PELICULAS_SERVICE_URL:http://PELICULAS-SERVICE}
  juegos:
    url: ${JUEGOS_SERVICE_URL:http://JUEGOS-SERVICE}
