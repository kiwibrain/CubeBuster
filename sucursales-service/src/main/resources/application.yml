server:
  port: ${PORT:8089}

spring:
  profiles:
    active: dev
  application:
    name: sucursales-service
  datasource:
    url: jdbc:h2:mem:sucursales_service_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    cubeBuster: INFO
    org.springframework.web: WARN

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
